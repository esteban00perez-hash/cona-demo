<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Cona — Reporte de Mejenga</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#0a1a10;--card:rgba(255,255,255,.03);--border:rgba(255,255,255,.06);
--g:#A7EE43;--g2:rgba(167,238,67,.15);
--w:#fff;--w7:rgba(255,255,255,.7);--w4:rgba(255,255,255,.35);--w2:rgba(255,255,255,.15);
--neg-bg:rgba(20,20,25,.85);--neg-c:rgba(255,255,255,.55);
--ver-bg:rgba(167,238,67,.88);--ver-c:#0a1a10;
}
html{background:var(--bg)}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--w);min-height:100vh;display:flex;justify-content:center}
.wrap{width:100%;max-width:480px;padding:0 0 40px}

/* Loading / Error */
.state{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:16px;padding:20px}
.spinner{width:40px;height:40px;border:3px solid var(--w2);border-top-color:var(--g);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.state p{font-size:14px;color:var(--w4);text-align:center}
.state.error p{color:#ff6b6b}
.hidden{display:none!important}

/* Header */
.hdr{text-align:center;padding:24px 16px 16px}
.hdr .logo{margin:0 auto 12px}
.hdr .meta{font-size:11px;color:var(--w4);display:flex;flex-wrap:wrap;justify-content:center;gap:6px 14px;margin-top:8px}
.hdr .meta span{display:flex;align-items:center;gap:4px}
.hdr .game-name{font-size:22px;font-weight:800;margin-top:4px}
.hdr .format-badge{display:inline-block;font-size:10px;font-weight:700;background:var(--g2);color:var(--g);padding:3px 10px;border-radius:20px;margin-top:6px}

/* Scoreboard */
.score-block{padding:20px 16px 12px;text-align:center}
.score-names{display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:8px}
.score-names .sn-label{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.04em}
.score-names .sn-label.t1{color:var(--w7)}
.score-names .sn-label.t2{color:var(--g)}
.score-names .sn-vs{font-size:10px;color:var(--w4);font-weight:600}
.score-nums{display:flex;align-items:center;justify-content:center;gap:6px}
.score-num{font-size:56px;font-weight:800;line-height:1}
.score-num.t1{color:#fff}
.score-num.t2{color:var(--g)}
.score-sep{font-size:28px;color:var(--w4);font-weight:300;padding:0 10px}
.winner-wrap{margin-top:10px}
.winner-badge{display:inline-block;font-size:10px;font-weight:800;background:var(--g);color:#0a1a10;padding:4px 16px;border-radius:20px;text-transform:uppercase;letter-spacing:.08em}
.winner-badge.draw{background:var(--w2);color:var(--w7)}

/* Section card */
.sect{margin:12px 10px;background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:visible}
.sect-title{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:var(--g);padding:14px 16px 0}

/* Pitch */
.pitch-wrap{position:relative;width:100%;padding-bottom:160%;background:linear-gradient(180deg,#0f2916 0%,#0f2916 10%,#14351d 10%,#14351d 20%,#0f2916 20%,#0f2916 30%,#14351d 30%,#14351d 40%,#0f2916 40%,#0f2916 50%,#14351d 50%,#14351d 60%,#0f2916 60%,#0f2916 70%,#14351d 70%,#14351d 80%,#0f2916 80%,#0f2916 90%,#14351d 90%,#14351d 100%);border-radius:12px;overflow:visible;margin:10px 10px 30px}
.fm{position:absolute;border:1px solid rgba(167,238,67,.12);pointer-events:none;z-index:1}
.fm.bd{left:3%;right:3%;top:1.5%;bottom:1.5%;border-radius:3px}
.fm.hl{left:3%;right:3%;top:50%;height:0}
.fm.cc{width:60px;height:60px;border-radius:50%;left:50%;top:50%;transform:translate(-50%,-50%)}
.fm.cd{width:5px;height:5px;border-radius:50%;background:rgba(167,238,67,.12);left:50%;top:50%;transform:translate(-50%,-50%);border:none}
.fm.bt{left:50%;top:1.5%;width:50%;height:14%;transform:translateX(-50%)}
.fm.bb{left:50%;bottom:1.5%;width:50%;height:14%;transform:translateX(-50%)}
.fm.gt{left:50%;top:1.5%;width:22%;height:5%;transform:translateX(-50%)}
.fm.gb{left:50%;bottom:1.5%;width:22%;height:5%;transform:translateX(-50%)}

/* Player nodes */
.pn{position:absolute;z-index:5;display:flex;flex-direction:column;align-items:center;transform:translate(-50%,-50%)}
.pn .bl{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;box-shadow:0 3px 12px rgba(0,0,0,.5);position:relative}
.pn.t1 .bl{background:rgba(20,20,25,.9);border:2.5px solid rgba(255,255,255,.5);color:#fff}
.pn.t2 .bl{background:var(--g);border:2.5px solid rgba(120,200,30,.6);color:var(--ver-c)}
.pn.por .bl{border-style:dashed}
.pn.mvp .bl{border-color:#fbbf24;box-shadow:0 0 16px rgba(251,191,36,.4),0 3px 12px rgba(0,0,0,.5)}
.pn .lb{font-size:8px;font-weight:700;color:rgba(255,255,255,.75);margin-top:3px;text-shadow:0 1px 4px rgba(0,0,0,.9);max-width:60px;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pn .rating{position:absolute;top:-6px;right:-10px;font-size:8px;font-weight:800;padding:1px 5px;border-radius:8px;z-index:6;line-height:1.4}
.pn .rating.high{background:#A7EE43;color:#0a1a10}
.pn .rating.mid{background:#fbbf24;color:#0a1a10}
.pn .rating.low{background:#ff6b6b;color:#fff}
.pn .stats-row{display:flex;align-items:center;gap:3px;margin-top:3px;flex-wrap:wrap;justify-content:center;max-width:70px}
.pn .stat-icon{display:flex;align-items:center;gap:1px}
.pn .stat-icon svg{width:12px;height:12px}
.pn .stat-icon .stat-x{font-size:7px;font-weight:800;color:rgba(255,255,255,.7)}

/* Details/Summary */
details{margin:12px 10px;background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden}
details summary{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:var(--g);padding:14px 16px;cursor:pointer;list-style:none;display:flex;align-items:center;justify-content:between;gap:8px}
details summary::-webkit-details-marker{display:none}
details summary::after{content:'\25BC';font-size:8px;color:var(--w4);margin-left:auto;transition:transform .2s}
details[open] summary::after{transform:rotate(180deg)}

/* Stats comparison */
.cmp-row{display:flex;align-items:center;padding:8px 16px;gap:8px}
.cmp-row:not(:last-child){border-bottom:1px solid rgba(255,255,255,.04)}
.cmp-v{font-size:16px;font-weight:800;min-width:28px;text-align:center;font-variant-numeric:tabular-nums}
.cmp-v.t1{color:#fff}
.cmp-v.t2{color:var(--g)}
.cmp-v.win{background:var(--g2);border-radius:6px;padding:2px 6px}
.cmp-v.t2.win{background:rgba(167,238,67,.2)}
.cmp-lb{flex:1;text-align:center;font-size:11px;font-weight:600;color:var(--w4)}

/* Timeline */
.tl-container{padding:12px 16px 16px;position:relative;background:rgba(0,0,0,.25);border-radius:0 0 16px 16px}
.tl-container::before{content:'';position:absolute;left:50%;top:12px;bottom:16px;width:1px;background:rgba(255,255,255,.07)}
.tl-row{display:flex;align-items:center;margin-bottom:4px;min-height:36px;position:relative}
.tl-row.t1{justify-content:flex-end;padding-right:calc(50% + 14px)}
.tl-row.t1 .tl-content{text-align:right;flex-direction:row-reverse}
.tl-row.t2{padding-left:calc(50% + 14px)}
.tl-content{display:flex;align-items:center;gap:6px}
.tl-ico{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;flex-shrink:0}
.tl-ico svg{width:16px;height:16px}
.tl-min{font-size:10px;font-weight:800;color:var(--w4);font-variant-numeric:tabular-nums}
.tl-player{font-size:12px;font-weight:700}
.tl-row.t1 .tl-player{color:#fff}
.tl-row.t2 .tl-player{color:var(--g)}
.tl-assist{font-size:9px;font-weight:600;color:rgba(88,166,255,.7)}
.tl-score-marker{position:absolute;left:50%;transform:translateX(-50%);font-size:9px;font-weight:800;color:var(--w4);background:var(--bg);padding:2px 6px;border-radius:4px;border:1px solid var(--border)}
.tl-dot{position:absolute;left:50%;transform:translateX(-50%);width:7px;height:7px;border-radius:50%}
.tl-row.t1 .tl-dot{background:rgba(255,255,255,.5)}
.tl-row.t2 .tl-dot{background:var(--g)}
.tl-autogoal{font-size:9px;font-weight:700;color:#ff6b6b;padding:1px 5px;background:rgba(255,60,60,.1);border-radius:4px}
.tl-empty{text-align:center;padding:20px 0;color:var(--w4);font-size:12px}
.tl-score-row{text-align:center;padding:2px 0 6px;font-size:14px;font-weight:800;letter-spacing:.05em}

/* Player tables */
.pt{width:100%;border-collapse:collapse}
.pt-header{padding:12px 16px 6px}
.pt-header .th{display:flex;align-items:center;gap:6px}
.pt-header .th-dot{width:14px;height:14px;border-radius:5px}
.pt-header .th-dot.t1{background:var(--neg-bg);border:2px solid var(--neg-c)}
.pt-header .th-dot.t2{background:var(--ver-bg)}
.pt-header .th-name{font-size:13px;font-weight:800}
.pt th{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--w4);padding:6px 8px;text-align:center;border-bottom:1px solid rgba(255,255,255,.06)}
.pt th:first-child,.pt td:first-child{text-align:center;width:32px}
.pt th:nth-child(2),.pt td:nth-child(2){text-align:left}
.pt td{font-size:12px;font-weight:600;padding:8px 8px;text-align:center;border-bottom:1px solid rgba(255,255,255,.03)}
.pt td:nth-child(2){color:var(--w7);font-weight:700}
.pt td .rt{display:inline-block;font-size:10px;font-weight:800;padding:2px 6px;border-radius:6px}
.pt td .rt.high{background:rgba(167,238,67,.15);color:var(--g)}
.pt td .rt.mid{background:rgba(251,191,36,.12);color:#fbbf24}
.pt td .rt.low{background:rgba(255,107,107,.12);color:#ff6b6b}
.pt-sep{height:8px}

/* MVP Card */
.mvp-card{margin:16px 10px;background:linear-gradient(135deg,rgba(251,191,36,.08),rgba(167,238,67,.06));border:1.5px solid rgba(251,191,36,.2);border-radius:18px;padding:20px;text-align:center;position:relative;overflow:hidden}
.mvp-card::before{content:'';position:absolute;top:-30px;right:-30px;width:100px;height:100px;background:radial-gradient(circle,rgba(251,191,36,.12),transparent 70%);pointer-events:none}
.mvp-badge{display:inline-block;font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.12em;background:rgba(251,191,36,.15);color:#fbbf24;padding:4px 12px;border-radius:20px;margin-bottom:10px}
.mvp-name{font-size:24px;font-weight:800}
.mvp-team-info{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:6px}
.mvp-team-dot{width:14px;height:14px;border-radius:5px}
.mvp-team-dot.t1{background:var(--neg-bg);border:2px solid var(--neg-c)}
.mvp-team-dot.t2{background:var(--ver-bg)}
.mvp-team-label{font-size:11px;font-weight:700;color:var(--w4)}
.mvp-rating{font-size:36px;font-weight:800;color:#fbbf24;margin:10px 0}
.mvp-stats{display:flex;justify-content:center;gap:16px;flex-wrap:wrap}
.mvp-stat{display:flex;flex-direction:column;align-items:center;gap:4px}
.mvp-stat svg{width:18px;height:18px}
.mvp-stat-v{font-size:16px;font-weight:800}
.mvp-stat-l{font-size:8px;font-weight:700;color:var(--w4);text-transform:uppercase;letter-spacing:.06em}

/* Player popup */
.pp-bg{position:fixed;inset:0;z-index:100;display:none;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);align-items:flex-end;justify-content:center}
.pp-bg.on{display:flex}
.pp{background:rgba(10,20,13,.97);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.08);border-top:2px solid var(--g);border-radius:20px 20px 0 0;width:100%;max-width:480px;max-height:75vh;overflow:hidden}
.pp-hd{display:flex;align-items:center;gap:10px;padding:14px 16px 10px;border-bottom:1px solid rgba(255,255,255,.06)}
.pp-j{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;flex-shrink:0}
.pp-j.t1{background:var(--neg-bg);border:2.5px solid var(--neg-c);color:#fff}
.pp-j.t2{background:var(--ver-bg);border:2.5px solid rgba(120,200,30,.5);color:var(--ver-c)}
.pp-nm{font-size:16px;font-weight:800;flex:1}
.pp-pos{font-size:9px;font-weight:700;color:var(--w4);text-transform:uppercase;letter-spacing:.06em;margin-top:1px}
.pp-rt{font-size:18px;font-weight:800;padding:2px 10px;border-radius:8px}
.pp-rt.high{background:rgba(167,238,67,.15);color:var(--g)}
.pp-rt.mid{background:rgba(251,191,36,.12);color:#fbbf24}
.pp-rt.low{background:rgba(255,107,107,.12);color:#ff6b6b}
.pp-x{width:32px;height:32px;border-radius:10px;background:rgba(255,255,255,.06);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--w4);font-size:13px;flex-shrink:0;border:none;font-family:inherit;-webkit-appearance:none}
/* Tabs */
.pp-tabs{display:flex;border-bottom:1px solid rgba(255,255,255,.06)}
.pp-tab{flex:1;padding:10px;text-align:center;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--w4);cursor:pointer;border:none;background:none;font-family:inherit;-webkit-appearance:none;transition:color .15s}
.pp-tab.on{color:var(--g);box-shadow:inset 0 -2px 0 var(--g)}
/* Slides */
.pp-slides{display:flex;transition:transform .25s ease;width:200%}
.pp-slide{width:50%;overflow-y:auto;max-height:50vh;padding:12px 16px 20px;flex-shrink:0}
/* Stat items */
.pp-sg{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.pp-si{display:flex;align-items:center;gap:8px;padding:10px 12px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:10px}
.pp-si-ico{display:flex;align-items:center;justify-content:center}
.pp-si-ico svg{width:16px;height:16px}
.pp-si-lb{font-size:9px;font-weight:700;color:var(--w4);text-transform:uppercase;flex:1}
.pp-si-v{font-size:16px;font-weight:800;font-variant-numeric:tabular-nums}
.pp-si.gol{color:var(--g)}.pp-si.ast{color:#58a6ff}.pp-si.tap{color:#fbbf24}
.pp-si.tir{color:var(--w7)}.pp-si.pst{color:#ffa500}.pp-si.sal{color:#58a6ff}
.pp-si.ag{color:#ff6b6b}.pp-si.ta{color:var(--w7)}
/* Rating breakdown */
.pp-brk{display:flex;flex-direction:column;gap:4px}
.pp-br{display:flex;align-items:center;gap:8px;padding:8px 12px;border-bottom:1px solid rgba(255,255,255,.03)}
.pp-br:last-child{border-bottom:none}
.pp-br-lb{font-size:11px;font-weight:600;color:var(--w4);flex:1}
.pp-br-stat{font-size:10px;font-weight:700;color:var(--w4);min-width:20px;text-align:center}
.pp-br-pts{font-size:13px;font-weight:800;min-width:50px;text-align:right;font-variant-numeric:tabular-nums}
.pp-br-pts.pos{color:var(--g)}
.pp-br-pts.neg{color:#ff6b6b}
.pp-br-pts.zero{color:var(--w4)}
.pp-br-base{color:var(--w7)}
.pp-br-total{padding:10px 12px;background:rgba(167,238,67,.06);border:1px solid rgba(167,238,67,.12);border-radius:10px;display:flex;align-items:center;justify-content:space-between;margin-top:4px}
.pp-br-total-lb{font-size:11px;font-weight:800;color:var(--g);text-transform:uppercase;letter-spacing:.08em}
.pp-br-total-v{font-size:20px;font-weight:800;color:var(--g)}

/* Footer */
.ftr{text-align:center;padding:32px 16px 20px;color:var(--w4)}
.ftr .tagline{font-size:11px;font-style:italic;font-weight:500;line-height:1.5;margin-bottom:12px;color:var(--w7)}
.ftr .links{font-size:10px;font-weight:600}
.ftr .links a{color:var(--g);text-decoration:none}

/* Back button */
.back-bar{display:flex;align-items:center;justify-content:space-between;padding:max(12px,env(safe-area-inset-top,12px)) 12px 8px;position:sticky;top:0;z-index:50;background:rgba(10,26,16,.9);backdrop-filter:blur(8px)}
.back-btn{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:8px 14px;font-family:inherit;font-size:11px;font-weight:700;color:var(--w7);cursor:pointer;display:flex;align-items:center;gap:6px}
.back-btn:active{background:rgba(255,255,255,.12)}
.share-btn{background:var(--g2);border:1px solid rgba(167,238,67,.2);border-radius:10px;padding:8px 14px;font-family:inherit;font-size:11px;font-weight:700;color:var(--g);cursor:pointer}
.share-btn:active{opacity:.7}

/* Team label row */
.team-divider{display:flex;align-items:center;gap:8px;padding:10px 16px 4px}
.team-divider .line{flex:1;height:1px;background:rgba(255,255,255,.06)}
</style>
</head>
<body>

<div class="wrap">
  <!-- Loading -->
  <div id="loading" class="state">
    <div class="spinner"></div>
    <p>Cargando reporte...</p>
  </div>

  <!-- Error -->
  <div id="error" class="state error hidden">
    <p id="error-msg">No se encontro la mejenga.</p>
  </div>

  <!-- Report -->
  <div id="report" class="hidden">

    <!-- Back bar -->
    <div class="back-bar">
      <button class="back-btn" id="backBtn" onclick="goBack()" style="display:none">← Volver</button>
      <div style="flex:1"></div>
      <button class="share-btn" onclick="shareReport()">Compartir</button>
    </div>

    <!-- Header -->

/* ── Helpers ── */
function teamScore(players, team) {
  const own = team === 't1' ? 't2' : 't1';
  let g = 0;
  players.forEach(p => {
    if (p.team === team) g += (p.goals || 0);
    if (p.team === own) g += (p.autogoals || 0);
  });
  return g;
}

function formatTime(sec) {
  if (!sec && sec !== 0) return '--:--';
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  return String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
}

function formatDate(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  return d.toLocaleDateString('es-CR', { weekday:'short', day:'numeric', month:'short', year:'numeric' });
}

function ratingClass(r) {
  if (r >= 7) return 'high';
  if (r >= 5) return 'mid';
  return 'low';
}

// Smart formation: assigns positions based on player stats
// Goalkeeper at back, then sorts field players by offensive score
// More goals/assists = further forward
function getFormation(players, isTop) {
  const n = players.length;
  if (!n) return [];
  const yA = isTop ? 2 : 52;
  const yB = isTop ? 49 : 98;

  // Goalkeeper always first position
  const pts = [[50, isTop ? yA + 1 : yB - 1]];
  const f = n - 1;
  if (!f) return pts;

  // Fut 7 formations (6 field players)
  let rows;
  if (f <= 2) rows = [f];
  else if (f === 3) rows = [2, 1];         // 2-1
  else if (f === 4) rows = [2, 2];          // 2-2
  else if (f === 5) rows = [2, 2, 1];       // 2-2-1
  else if (f === 6) rows = [3, 2, 1];       // 3-2-1
  else if (f === 7) rows = [3, 3, 1];       // 3-3-1
  else if (f === 8) rows = [3, 3, 2];       // 3-3-2
  else rows = [3, 3, Math.max(1, f - 6)];

  // Width per row — defenders wider, attackers narrower
  const widths = rows.map((_, i) => {
    const depth = i / (rows.length - 1 || 1); // 0=defense, 1=attack
    return 82 - depth * 20; // defense=82%, attack=62%
  });

  rows.forEach((cnt, ri) => {
    const frac = (ri + 1) / (rows.length + 1);
    const ry = isTop ? yA + (yB - yA) * frac : yB - (yB - yA) * frac;
    const w = widths[ri];
    const startX = (100 - w) / 2;
    for (let j = 0; j < cnt; j++) {
      pts.push([startX + (j + 1) / (cnt + 1) * w, ry]);
    }
  });
  return pts;
}

// Sort field players: most defensive first, most offensive last
function sortByRole(players) {
  const gk = players.filter(p => p.por);
  const field = players.filter(p => !p.por);
  // Offensive score: goals*3 + assists*2 + shotsOn - salvadas*2 - saves
  field.sort((a, b) => {
    const oa = (a.goals||0)*3 + (a.assists||0)*2 + (a.shotsOn||0) - (a.salvadas||0)*2;
    const ob = (b.goals||0)*3 + (b.assists||0)*2 + (b.shotsOn||0) - (b.salvadas||0)*2;
    return oa - ob; // least offensive (defenders) first
  });
  return [...gk, ...field];
}

function statIcons(p) {
  let html = '';
  const items = [
    { key:'goals', ic:'goal', color:'#A7EE43' },
    { key:'assists', ic:'assist', color:'#58a6ff' },
    { key:'saves', ic:'glove', color:'#fbbf24' },
    { key:'salvadas', ic:'shield', color:'#58a6ff' },
    { key:'defcon', ic:'defcon', color:'#58a6ff' },
    { key:'autogoals', ic:'autogoal', color:'#ff6b6b' }
  ];
  items.forEach(it => {
    let v = p[it.key] || 0;
    if (it.alt) v += (p[it.alt] || 0);
    if (!v) return;
    html += `<span class="stat-icon" style="color:${it.color}">${IC[it.ic]}${v > 1 ? `<span class="stat-x">x${v}</span>` : ''}</span>`;
  });
  return html;
}

function teamStat(players, team, key) {
  return players.filter(p => p.team === team).reduce((s, p) => s + (p[key] || 0), 0);
}

  else $('winner-wrap').innerHTML = '<div class="winner-badge draw">Empate</div>';

  const t2p = P.filter(p => p.team === 't2');
  const mvpId = D.MVP ? D.MVP.id : null;

  window._winTeam = s1 > s2 ? 't1' : s2 > s1 ? 't2' : null;

  function renderTeam(players, isTop) {
    const sorted = sortByRole(players);
    const positions = getFormation(sorted, isTop);
    sorted.forEach((p, i) => {
      if (!positions[i]) return;
      const [x, y] = positions[i];
      const isMvp = p.id === mvpId;
      const node = document.createElement('div');
      node.className = `pn ${p.team}${p.por ? ' por' : ''}${isMvp ? ' mvp' : ''}`;
      node.style.left = x + '%';
      node.style.top = y + '%';
      node.style.cursor = 'pointer';
      node.onclick = function(e) { e.stopPropagation(); openPP(p.id); };

      const r = p.rating ? parseFloat(p.rating).toFixed(1) : null;
      node.innerHTML = `
        <div class="bl">
          ${p.num || ''}
          ${r ? `<span class="rating ${ratingClass(parseFloat(r))}">${r}</span>` : ''}
        </div>
        <div class="lb">${(p.name || '').split(' ')[0]}</div>
        <div class="stats-row">${statIcons(p)}</div>
      `;
      pitch.appendChild(node);
    });
  }
  renderTeam(t1p, true);
  renderTeam(t2p, false);

  // Stats comparison
  const statDefs = [
    { label:'Goles', fn: t => teamScore(P, t) },
    { label:'Tiros totales', fn: t => teamStat(P,t,'goals')+teamStat(P,t,'shotsOn')+teamStat(P,t,'shotsOff')+teamStat(P,t,'posts') },
    { label:'Al arco', fn: t => teamStat(P,t,'goals')+teamStat(P,t,'shotsOn') },
    { label:'Afuera', key:'shotsOff' },
    { label:'Palos', key:'posts' },
    { label:'Tapadas (POR)', key:'saves' },
    { label:'Asistencias', key:'assists' },
    { label:'Salvadas Clave', key:'salvadas' }
  ];
  let cmpHtml = '';
  statDefs.forEach(sd => {
    const v1 = sd.fn ? sd.fn('t1') : teamStat(P, 't1', sd.key);
    const v2 = sd.fn ? sd.fn('t2') : teamStat(P, 't2', sd.key);
    const w1 = v1 > v2 ? ' win' : '';
    const w2 = v2 > v1 ? ' win' : '';
    cmpHtml += `<div class="cmp-row"><span class="cmp-v t1${w1}">${v1}</span><span class="cmp-lb">${sd.label}</span><span class="cmp-v t2${w2}">${v2}</span></div>`;
  });
  $('stats-cmp').innerHTML = cmpHtml;

  // Timeline
  const EV = D.EV || [];
  const notable = EV.filter(e => e.type === 'goal' || e.type === 'autogoal' || e.type === 'posts' || e.type === 'salvadas' || e.type === 'saves');
  if (!notable.length) {
    $('timeline').innerHTML = '<div class="tl-empty">Sin eventos registrados</div>';
  } else {
    let running1 = 0, running2 = 0;
    let tlHtml = '';
    notable.forEach(ev => {
      const isGoal = ev.type === 'goal' || ev.type === 'autogoal';
      const isPost = ev.type === 'posts';
      const isSalvada = ev.type === 'salvadas';
      const isSave = ev.type === 'saves';
      if (isGoal) {
        const isAuto = ev.type === 'autogoal';
        if (ev.type === 'goal') {
          if (ev.team === 't1') running1++; else running2++;
        } else {
          if (ev.team === 't1') running2++; else running1++;
        }
        const displayTeam = isAuto ? (ev.team === 't1' ? 't2' : 't1') : ev.team;
        const ico = isAuto ? IC.autogoal : IC.goal;
        const icoColor = isAuto ? '#ff6b6b' : (displayTeam === 't1' ? '#fff' : '#A7EE43');
        tlHtml += `<div class="tl-row ${displayTeam}"><div class="tl-dot"></div><div class="tl-content">
          <span class="tl-ico" style="color:${icoColor}">${ico}</span>
          <div class="tl-min">${ev.time || ''}'</div>
          <div><div class="tl-player">${ev.player || ''}${isAuto ? ' <span class="tl-autogoal">AG</span>' : ''}</div>${ev.astBy && !isAuto ? `<div class="tl-assist">ast. ${ev.astBy}</div>` : ''}</div>
        </div></div>`;
        const scoreColor = displayTeam === 't1' ? '#fff' : 'var(--g)';
        tlHtml += `<div class="tl-score-row" style="color:${scoreColor}">${running1} - ${running2}</div>`;
      } else if (isPost) {
        tlHtml += `<div class="tl-row ${ev.team}"><div class="tl-dot" style="background:#ffa500"></div><div class="tl-content">
          <span class="tl-ico" style="color:#ffa500">${IC.post}</span>
          <div class="tl-min" style="color:#ffa500">${ev.time || ''}'</div>
          <div class="tl-player" style="color:#ffa500">${ev.player || ''}</div>
        </div></div>`;
      } else if (isSalvada) {
        tlHtml += `<div class="tl-row ${ev.team}"><div class="tl-dot" style="background:#58a6ff"></div><div class="tl-content">
          <span class="tl-ico" style="color:#58a6ff">${IC.shield}</span>
          <div class="tl-min" style="color:#58a6ff">${ev.time || ''}'</div>
          <div class="tl-player" style="color:#58a6ff">${ev.player || ''}</div>
        </div></div>`;
      } else if (isSave) {
        tlHtml += `<div class="tl-row ${ev.team}"><div class="tl-dot" style="background:#fbbf24"></div><div class="tl-content">
          <span class="tl-ico" style="color:#fbbf24">${IC.save}</span>
          <div class="tl-min" style="color:#fbbf24">${ev.time || ''}'</div>
          <div class="tl-player" style="color:#fbbf24">${ev.player || ''}</div>
        </div></div>`;
      }
    });
    $('timeline').innerHTML = tlHtml;
  }

  // Player tables
  function playerTable(players, team) {
    const teamName = team === 't1' ? 'Negro' : 'Verde';
    const dotClass = team === 't1' ? 't1' : 't2';
    const sorted = [...players].sort((a,b) => (b.rating||0)-(a.rating||0));
    let html = `<div class="pt-header"><div class="th"><div class="th-dot ${dotClass}"></div><span class="th-name">${teamName}</span></div></div>`;
    html += `<table class="pt"><thead><tr><th>#</th><th>Jugador</th><th>Gol</th><th>Ast</th><th>Rating</th></tr></thead><tbody>`;
    sorted.forEach(p => {
      const r = p.rating ? parseFloat(p.rating).toFixed(1) : '-';
      const rc = p.rating ? ratingClass(parseFloat(p.rating)) : '';
      html += `<tr><td>${p.num||''}</td><td>${p.name||''}</td><td>${p.goals||0}</td><td>${p.assists||0}</td><td><span class="rt ${rc}">${r}</span></td></tr>`;
    });
    html += '</tbody></table>';
    return html;
  }
  $('player-tables').innerHTML = playerTable(t1p, 't1') + '<div class="pt-sep"></div>' + playerTable(t2p, 't2');

  // MVP
  if (D.MVP) {
    const m = D.MVP;
    const mTeam = m.team === 't1' ? 'Negro' : 'Verde';
    const mDot = m.team === 't1' ? 't1' : 't2';
    const r = m.rating ? parseFloat(m.rating).toFixed(1) : '-';

    // Build context line explaining why they won MVP
    const highlights = [];
    if (m.goals) highlights.push(m.goals + (m.goals===1?' gol':' goles'));
    if (m.assists) highlights.push(m.assists + (m.assists===1?' asistencia':' asistencias'));
    if (m.saves) highlights.push(m.saves + (m.saves===1?' tapada':' tapadas'));
    if (m.salvadas) highlights.push(m.salvadas + (m.salvadas===1?' salvada clave':' salvadas clave'));
    const winTeam = s1>s2?'t1':s2>s1?'t2':null;
    const onWinner = winTeam && m.team === winTeam;
    let reason = '';
    if (highlights.length) reason = highlights.join(', ');
    if (onWinner) reason += (reason ? ' con el equipo ganador' : 'Del equipo ganador');
    reason += '.';

    $('mvp-section').innerHTML = `
      <div class="mvp-card">
        <div class="mvp-badge">MVP de la Mejenga</div>
        <div class="mvp-name">${m.name || ''}</div>
        <div class="mvp-team-info">
          <div class="mvp-team-dot ${mDot}"></div>
          <span class="mvp-team-label">Equipo ${mTeam} · #${m.num||''}</span>
        </div>
        <div class="mvp-rating">${r}</div>
        <div style="font-size:12px;color:rgba(255,255,255,.55);font-weight:600;margin-top:4px;line-height:1.5">${reason}</div>
      </div>`;
  } else {
    $('mvp-section').style.display='none';
  }

  // Show report
  document.getElementById('loading').classList.add('hidden');
  document.getElementById('report').classList.remove('hidden');
}

/* ── Player Popup ── */
function openPP(id) {
  const p = (window._allPlayers || []).find(x => x.id === id);
  if (!p) return;
  const $ = s => document.getElementById(s);

  // Header
  const j = $('ppJ');
  j.className = 'pp-j ' + p.team;
  j.textContent = p.num || '';
  $('ppNm').textContent = p.name || '';
  $('ppPos').textContent = p.por ? 'Portero' : 'Jugador de campo';
  const r = p.rating ? parseFloat(p.rating).toFixed(1) : '-';
  const rc = p.rating ? ratingClass(parseFloat(p.rating)) : '';
  const rtEl = $('ppRt');
  rtEl.textContent = r;
  rtEl.className = 'pp-rt ' + rc;

  // Stats tab
  const stats = p.por
    ? [{k:'saves',l:'Tapadas',c:'tap'},{k:'goals',l:'Goles',c:'gol'},{k:'assists',l:'Asistencias',c:'ast'},{k:'shotsOn',l:'Al arco',c:'ta'},{k:'shotsOffError',l:'TF Error',c:'ag'},{k:'shotsOffNeutral',l:'TF Neutro',c:'tir'},{k:'shotsOffGood',l:'TF Buen tiro',c:'gol'},{k:'posts',l:'Palos',c:'pst'},{k:'autogoals',l:'Autogoles',c:'ag'}]
    : [{k:'goals',l:'Goles',c:'gol'},{k:'assists',l:'Asistencias',c:'ast'},{k:'defcon',l:'DEF CON',c:'sal'},{k:'salvadas',l:'Salvada Clave',c:'sal'},{k:'shotsOn',l:'Al arco',c:'ta'},{k:'shotsOffError',l:'TF Error',c:'ag'},{k:'shotsOffNeutral',l:'TF Neutro',c:'tir'},{k:'shotsOffGood',l:'TF Buen tiro',c:'gol'},{k:'posts',l:'Palos',c:'pst'},{k:'autogoals',l:'Autogoles',c:'ag'}];
  const icons = {
    goals: IC.goal, assists: IC.assist, saves: IC.glove, salvadas: IC.shield, defcon: IC.defcon,
    shotsOn: IC.goal, shotsOffError: IC.goal, shotsOffNeutral: IC.goal, shotsOffGood: IC.goal, posts: IC.goal, autogoals: IC.autogoal
  };
  let sh = '<div class="pp-sg">';
  stats.forEach(s => {
    const v = p[s.k] || 0;
    sh += `<div class="pp-si ${s.c}"><span class="pp-si-ico">${icons[s.k]||''}</span><span class="pp-si-lb">${s.l}</span><span class="pp-si-v">${v}</span></div>`;
  });
  sh += '</div>';
  $('ppStats').innerHTML = sh;

  // Rating breakdown tab
  const winTeam = window._winTeam;
  const lines = [];
  lines.push({l:'Base', stat:'', pts:6.0});
  if (p.goals) lines.push({l:'Goles', stat:'x'+p.goals, pts:p.goals*0.8});
  if (p.assists) lines.push({l:'Asistencias', stat:'x'+p.assists, pts:p.assists*0.5});
  if (p.por && p.saves) lines.push({l:'Tapadas', stat:'x'+p.saves, pts:p.saves*0.2});
  if (p.por) {
    const allP = window._allPlayers || [];
    const s1 = teamScore(allP,'t1'), s2 = teamScore(allP,'t2');
    const gc = p.team === 't1' ? s2 : s1;
    if (gc) lines.push({l:'Goles recibidos', stat:'x'+gc, pts:gc*(-0.2)});
  }
  if (p.defcon) lines.push({l:'DEF CON', stat:'x'+p.defcon, pts:p.defcon*0.1});
  if (p.salvadas) lines.push({l:'Salvadas Clave', stat:'x'+p.salvadas, pts:p.salvadas*0.35});
  if (p.shotsOn) lines.push({l:'Tiros al arco', stat:'x'+p.shotsOn, pts:p.shotsOn*0.1});
  if (p.posts) lines.push({l:'Palos', stat:'x'+p.posts, pts:p.posts*0.05});
  if (p.shotsOffError) lines.push({l:'TF Error', stat:'x'+p.shotsOffError, pts:p.shotsOffError*(-0.2)});
  if (p.shotsOffGood) lines.push({l:'TF Buen tiro', stat:'x'+p.shotsOffGood, pts:p.shotsOffGood*0.05});
  if (p.autogoals) lines.push({l:'Autogoles', stat:'x'+p.autogoals, pts:p.autogoals*(-1.0)});
  if (winTeam && p.team === winTeam) lines.push({l:'Equipo ganador', stat:'', pts:0.3});

  let bh = '<div class="pp-brk">';
  lines.forEach(ln => {
    const cls = ln.l === 'Base' ? 'pp-br-base' : ln.pts > 0 ? 'pos' : ln.pts < 0 ? 'neg' : 'zero';
    const sign = ln.pts > 0 && ln.l !== 'Base' ? '+' : '';
    bh += `<div class="pp-br">
      <span class="pp-br-lb">${ln.l}</span>
      <span class="pp-br-stat">${ln.stat}</span>
      <span class="pp-br-pts ${cls}">${sign}${ln.pts.toFixed(2)}</span>
    </div>`;
  });
  bh += '</div>';
  bh += `<div class="pp-br-total"><span class="pp-br-total-lb">Rating Final</span><span class="pp-br-total-v">${r}</span></div>`;
  $('ppBreak').innerHTML = bh;

  // Reset to first tab
  ppSlide(0);
  $('ppBg').classList.add('on');
}
function ppSlide(n) {
  document.getElementById('ppSlides').style.transform = 'translateX(' + (n * -50) + '%)';
  document.getElementById('ppTab0').classList.toggle('on', n === 0);
  document.getElementById('ppTab1').classList.toggle('on', n === 1);
}
function closePP() {
  document.getElementById('ppBg').classList.remove('on');
}

// Touch swipe support for popup slides
(function() {
  let startX = 0, curSlide = 0;
  const el = document.querySelector('.pp-slides');
  if (!el) return;
  el.addEventListener('touchstart', e => { startX = e.touches[0].clientX; }, {passive:true});
  el.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - startX;
    if (Math.abs(dx) > 50) {
      curSlide = dx < 0 ? 1 : 0;
      ppSlide(curSlide);
    }
  }, {passive:true});
})();

/* ── Init ── */
(async function() {
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');
  if (!id) {
    document.getElementById('loading').classList.add('hidden');
    document.getElementById('error-msg').textContent = 'Falta el parametro ?id= en la URL.';
    document.getElementById('error').classList.remove('hidden');
    return;
  }
  try {
    const doc = await db.collection('mejengas_organizador').doc(id).get();
    if (!doc.exists) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('error-msg').textContent = 'No se encontro la mejenga con ID: ' + id;
      document.getElementById('error').classList.remove('hidden');
      return;
    }
    render(doc.data());
  } catch (e) {
    console.error(e);
    document.getElementById('loading').classList.add('hidden');
    document.getElementById('error-msg').textContent = 'Error al cargar: ' + e.message;
    document.getElementById('error').classList.remove('hidden');
  }
})();

// Show back button always — navigate to organizer index
document.getElementById('backBtn').style.display='';
function goBack(){
  if(window.history.length>1){history.back();}
  else{window.location.href=location.href.replace(/\/[^\/]*$/,'/');}
}

function shareReport(){
  const url=location.href;
  if(navigator.share){
    navigator.share({title:'Reporte de Mejenga — Cona',url:url}).catch(()=>{});
  }else{
    navigator.clipboard.writeText(url).then(()=>{
      const btn=document.querySelector('.share-btn');
      btn.textContent='Link copiado!';
      setTimeout(()=>{btn.textContent='Compartir';},2000);
    }).catch(()=>{prompt('Copia el link:',url);});
  }
}
