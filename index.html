<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>Cona — Organizador</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none}
:root{
--bg:#0a1a10;--f1:#14351d;--f2:#184826;--line:rgba(255,255,255,.1);
--g:#A7EE43;--g2:rgba(167,238,67,.15);
--t1b:rgba(20,20,25,.85);--t1c:rgba(255,255,255,.55);
--t2b:rgba(167,238,67,.88);--t2c:#0a1a10;
--w:#fff;--w7:rgba(255,255,255,.7);--w4:rgba(255,255,255,.35);--w2:rgba(255,255,255,.15);
--sab:env(safe-area-inset-bottom,0px);--sat:env(safe-area-inset-top,0px)
}
html,body{height:100%;overflow:hidden;overscroll-behavior:none}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--w)}
/* SVG icons inherit color */
.ic{display:inline-flex;align-items:center;justify-content:center}
.ic svg{fill:currentColor}

/* ═══ SETUP ═══ */
.setup{position:fixed;inset:0;background:var(--bg);z-index:200;display:flex;flex-direction:column;overflow-y:auto;-webkit-overflow-scrolling:touch}
.setup.gone{display:none}
.su-h{padding:max(20px,var(--sat)) 20px 10px;text-align:center}
.su-h h1{font-size:20px;font-weight:800}
.su-h p{font-size:11px;color:var(--w4);margin-top:2px}
.su-b{padding:0 16px;flex:1}
.su-lbl{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--w4);margin:14px 0 6px}
.su-fx{display:flex;gap:8px}
.si{width:100%;padding:12px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);border-radius:10px;color:#fff;font-family:inherit;font-size:14px;font-weight:600;outline:none}
.si:focus{border-color:rgba(167,238,67,.4)}
.si::placeholder{color:rgba(255,255,255,.2)}
.si.sn{width:48px;flex:none;text-align:center;font-size:16px;font-weight:800;padding:12px 4px}
.su-t{margin:18px 0 8px;display:flex;align-items:center;gap:8px}
.su-td{width:18px;height:18px;border-radius:6px}
.su-td.t1{background:var(--t1b);border:2px solid var(--t1c)}
.su-td.t2{background:var(--t2b)}
.su-tn{font-size:13px;font-weight:800}
.su-r{display:flex;gap:6px;margin-bottom:5px;align-items:center}
.su-p{font-size:7px;font-weight:700;color:var(--w4);padding:4px 6px;background:rgba(255,255,255,.05);border-radius:4px;flex-shrink:0}
.su-x{width:30px;height:30px;display:flex;align-items:center;justify-content:center;border-radius:6px;background:rgba(255,60,60,.06);color:rgba(255,60,60,.5);font-size:14px;cursor:pointer;flex-shrink:0;border:none}
.su-a{width:100%;padding:10px;border:1px dashed rgba(255,255,255,.1);border-radius:8px;background:none;color:var(--w4);font-family:inherit;font-size:11px;font-weight:700;cursor:pointer;margin-top:3px}
.su-ft{position:sticky;bottom:0;padding:12px 16px calc(12px + var(--sab));background:linear-gradient(transparent,var(--bg) 30%)}
.su-go{width:100%;padding:16px;background:var(--g);color:#0a1a10;border:none;border-radius:12px;font-family:inherit;font-size:16px;font-weight:800;cursor:pointer}

/* ═══ APP ═══ */
.app{display:none;flex-direction:column;height:100dvh}
.app.on{display:flex}

/* Scoreboard */
.sb{display:flex;align-items:center;justify-content:center;padding:max(8px,calc(var(--sat) - 4px)) 12px 8px;background:rgba(0,0,0,.6);backdrop-filter:blur(10px);flex-shrink:0;gap:6px}
.sb-side{display:flex;align-items:center;gap:6px}
.sb-dot{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800}
.sb-dot.t1{background:var(--t1b);border:2px solid var(--t1c);color:#fff}
.sb-dot.t2{background:var(--t2b);color:var(--t2c)}
.sb-nm{font-size:10px;font-weight:700;color:var(--w7)}
.sb-sc{font-size:42px;font-weight:800;min-width:32px;text-align:center;line-height:1}
.sb-sc.t1{color:#fff}
.sb-sc.t2{color:var(--g)}
.sb-d{padding:0 6px;font-size:20px;color:var(--w4);font-weight:300}
.sb-tm{font-size:15px;font-weight:800;padding:7px 12px;border-radius:8px;cursor:pointer;font-variant-numeric:tabular-nums;margin-left:auto}
.sb-tm.on{color:var(--g);background:rgba(167,238,67,.1);border:1px solid rgba(167,238,67,.2)}
.sb-tm.off{color:var(--w4);background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);animation:bl 1.2s infinite}
@keyframes bl{0%,100%{opacity:1}50%{opacity:.3}}

/* Field */
.pitch{flex:1;position:relative;overflow:hidden;background:var(--f1)}
.pitch::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(180deg,var(--f1) 0%,var(--f1) 10%,var(--f2) 10%,var(--f2) 20%);opacity:.5}
.fm{position:absolute;border:1px solid var(--line);pointer-events:none;z-index:1}
.fm.bd{left:3%;right:3%;top:1.5%;bottom:1.5%;border-radius:3px}
.fm.hl{left:3%;right:3%;top:50%;height:0}
.fm.cc{width:70px;height:70px;border-radius:50%;left:50%;top:50%;transform:translate(-50%,-50%)}
.fm.cd{width:5px;height:5px;border-radius:50%;background:var(--line);left:50%;top:50%;transform:translate(-50%,-50%);border:none}
.fm.bt{left:50%;top:1.5%;width:50%;height:16%;transform:translateX(-50%)}
.fm.bb{left:50%;bottom:1.5%;width:50%;height:16%;transform:translateX(-50%)}
.fm.gt{left:50%;top:1.5%;width:22%;height:6%;transform:translateX(-50%)}
.fm.gb{left:50%;bottom:1.5%;width:22%;height:6%;transform:translateX(-50%)}

/* Nodes */
.pn{position:absolute;z-index:5;display:flex;flex-direction:column;align-items:center;cursor:pointer}
.pn:active .bl{transform:scale(.9)}
.bl{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:800;box-shadow:0 2px 10px rgba(0,0,0,.5);position:relative;transition:transform .08s}
.pn.t1 .bl{background:var(--t1b);border:2.5px solid var(--t1c);color:#fff;backdrop-filter:blur(3px)}
.pn.t2 .bl{background:var(--t2b);border:2.5px solid rgba(120,200,30,.5);color:var(--t2c)}
.pn.por .bl{border-style:dashed}
.pn .lb{font-size:7px;font-weight:700;color:rgba(255,255,255,.6);margin-top:2px;text-shadow:0 1px 3px rgba(0,0,0,.8);max-width:56px;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
/* badges */
.badge{position:absolute;min-width:17px;height:17px;border-radius:9px;font-size:9px;font-weight:800;display:flex;align-items:center;justify-content:center;padding:0 4px;box-shadow:0 1px 4px rgba(0,0,0,.3)}
.badge.bg{top:-5px;right:-5px;background:var(--g);color:#0a1a10}
.badge.bs{top:-5px;left:-5px;background:#fbbf24;color:#0a1a10}

/* ═══ POPUP ═══ */
.pop-bg{position:fixed;inset:0;z-index:50;display:none;background:rgba(0,0,0,.5);backdrop-filter:blur(3px);align-items:center;justify-content:center}
.pop-bg.on{display:flex}
.pop{background:rgba(12,22,15,.92);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:16px;width:calc(100% - 32px);max-width:360px;box-shadow:0 16px 48px rgba(0,0,0,.5)}
.pop-hd{display:flex;align-items:center;gap:10px;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid rgba(255,255,255,.06)}
.pop-j{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;flex-shrink:0}
.pop-j.t1{background:var(--t1b);border:2px solid var(--t1c);color:#fff}
.pop-j.t2{background:var(--t2b);color:var(--t2c)}
.pop-nm{font-size:15px;font-weight:800;flex:1}
.pop-ps{font-size:8px;font-weight:700;color:var(--w4);text-transform:uppercase;letter-spacing:.06em}
.pop-x{width:30px;height:30px;border-radius:8px;background:rgba(255,255,255,.06);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--w4);font-size:13px;flex-shrink:0;border:none;font-family:inherit}

/* Stat grid */
.sg{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.sc{border-radius:12px;overflow:hidden;border:1.5px solid transparent;display:flex;flex-direction:column}
.sc-top{display:flex;align-items:center;justify-content:center;gap:4px;padding:6px 4px 0}
.sc-ico{display:flex;align-items:center;justify-content:center}
.sc-ico svg{width:16px;height:16px}
.sc-lb{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.03em}
.sc-row{display:flex;align-items:center;justify-content:space-between}
.sc-btn{width:40px;height:38px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;cursor:pointer;border:none;background:none;font-family:inherit;color:inherit;transition:background .08s}
.sc-btn:active{background:rgba(255,255,255,.1)}
.sc-btn.mn{color:rgba(255,255,255,.2)}
.sc-v{font-size:20px;font-weight:800;min-width:20px;text-align:center;font-variant-numeric:tabular-nums}

/* colors */
.sc.gol{background:rgba(167,238,67,.06);border-color:rgba(167,238,67,.15);color:var(--g)}
.sc.ast{background:rgba(88,166,255,.05);border-color:rgba(88,166,255,.1);color:#58a6ff}
.sc.tap{background:rgba(251,191,36,.05);border-color:rgba(251,191,36,.1);color:#fbbf24}
.sc.tir{background:rgba(255,255,255,.02);border-color:rgba(255,255,255,.05);color:var(--w7)}
.sc.cle{background:rgba(255,107,107,.04);border-color:rgba(255,107,107,.08);color:#ff6b6b}

/* primary row */
.sc.pri{grid-column:span 3;flex-direction:row;align-items:center;padding:4px 0}
.sc.pri .sc-top{padding:0 8px;flex-direction:column;gap:2px}
.sc.pri .sc-ico svg{width:22px;height:22px}
.sc.pri .sc-lb{font-size:9px}
.sc.pri .sc-row{flex:1;justify-content:center;gap:4px}
.sc.pri .sc-btn{width:52px;height:44px;font-size:24px}
.sc.pri .sc-v{font-size:28px;min-width:30px}

/* ═══ ASSIST ═══ */
.ast-bg{position:fixed;inset:0;z-index:60;display:none;background:rgba(0,0,0,.65);flex-direction:column;justify-content:flex-end}
.ast-bg.on{display:flex}
.ast-sh{background:rgba(15,25,18,.95);backdrop-filter:blur(12px);border-top:2px solid var(--g);border-radius:16px 16px 0 0;padding:14px 16px calc(14px + var(--sab));max-height:55vh;overflow-y:auto}
.ast-t{font-size:11px;font-weight:700;color:var(--g);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;text-align:center}
.ast-g{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.ast-b{display:flex;align-items:center;gap:8px;padding:12px;border-radius:10px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.07);cursor:pointer}
.ast-b:active{background:rgba(88,166,255,.1);border-color:rgba(88,166,255,.25)}
.ast-j{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0}
.ast-j.t1{background:var(--t1b);border:1.5px solid var(--t1c);color:#fff}
.ast-j.t2{background:var(--t2b);color:var(--t2c)}
.ast-n{font-size:12px;font-weight:700;color:var(--w7)}
.ast-no{width:100%;padding:12px;border-radius:10px;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.04);cursor:pointer;text-align:center;font-size:11px;font-weight:700;color:var(--w4);margin-top:6px;font-family:inherit}

/* ═══ INFO BAR ═══ */
.ib{flex-shrink:0;display:flex;align-items:center;gap:6px;padding:6px 10px calc(6px + var(--sab));background:rgba(0,0,0,.5);backdrop-filter:blur(8px);border-top:1px solid rgba(255,255,255,.06);z-index:10}
.ib-ev{font-size:9px;font-weight:600;color:var(--w4)}
.ib-last{font-size:10px;font-weight:700;color:var(--w7);flex:1;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ib-btn{padding:6px 10px;border-radius:6px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.07);font-family:inherit;font-size:9px;font-weight:700;color:var(--w4);cursor:pointer}

/* ═══ TIMELINE ═══ */
.tl-bg{position:fixed;inset:0;z-index:100;display:none;background:rgba(0,0,0,.88);flex-direction:column}
.tl-bg.on{display:flex}
.tl-x{position:absolute;top:max(12px,var(--sat));right:12px;width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--w7);font-size:15px;z-index:1;border:none;font-family:inherit}
.tl-w{flex:1;overflow-y:auto;padding-bottom:24px}
.tl-hd{padding:max(20px,calc(var(--sat) + 8px)) 24px 16px;text-align:center}
.tl-mn{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--w4);margin-bottom:12px}
.tl-sr{display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:6px}
.tl-ts{display:flex;flex-direction:column;align-items:center;gap:4px;min-width:70px}
.tl-td{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800}
.tl-td.t1{background:var(--t1b);border:2px solid var(--t1c);color:#fff}
.tl-td.t2{background:var(--t2b);color:var(--t2c)}
.tl-tn{font-size:10px;font-weight:700;color:var(--w7)}
.tl-fs{font-size:42px;font-weight:800;line-height:1}
.tl-fs.t1{color:#fff}
.tl-fs.t2{color:var(--g)}
.tl-fd{font-size:20px;color:var(--w4);font-weight:300}
.tl-dur{font-size:10px;color:var(--w4);margin-top:4px}
.tl-bd{padding:8px 20px;position:relative}
.tl-bd::before{content:'';position:absolute;left:50%;top:0;bottom:0;width:1px;background:rgba(255,255,255,.07)}
.tl-emp{text-align:center;padding:32px 0;color:var(--w4);font-size:13px}
.tl-r{display:flex;align-items:center;margin-bottom:2px;min-height:40px;position:relative}
.tl-r.t1{justify-content:flex-end;padding-right:calc(50% + 10px)}
.tl-r.t1 .tl-c{text-align:right;flex-direction:row-reverse}
.tl-r.t2{padding-left:calc(50% + 10px)}
.tl-c{display:flex;align-items:center;gap:6px}
.tl-m{font-size:11px;font-weight:800;color:var(--w4);font-variant-numeric:tabular-nums}
.tl-p{font-size:13px;font-weight:700}
.tl-a{font-size:10px;font-weight:600;color:rgba(88,166,255,.7)}
.tl-dt{position:absolute;left:50%;transform:translateX(-50%);width:7px;height:7px;border-radius:50%}
.tl-r.t1 .tl-dt{background:var(--t1c)}
.tl-r.t2 .tl-dt{background:var(--g)}
.tl-rs{text-align:center;padding:2px 0 6px;font-size:14px;font-weight:800;letter-spacing:.05em}

/* ═══ EXPORT ═══ */
.ex-bg{position:fixed;inset:0;z-index:100;display:none;background:rgba(0,0,0,.8);flex-direction:column;justify-content:flex-end}
.ex-bg.on{display:flex}
.ex-sh{background:var(--bg);border-top:2px solid var(--g);border-radius:16px 16px 0 0;padding:16px 16px calc(16px + var(--sab));max-height:80vh;overflow-y:auto}
.ex-t{font-size:14px;font-weight:800;margin-bottom:12px;text-align:center}
.ex-pre{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:10px;padding:12px;font-family:'SF Mono',monospace;font-size:10px;color:var(--w7);white-space:pre-wrap;line-height:1.5;max-height:40vh;overflow-y:auto;margin-bottom:12px}
.ex-row{display:flex;gap:8px}
.ex-btn{flex:1;padding:14px;border-radius:10px;border:none;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer}
.ex-btn.cp{background:var(--g);color:#0a1a10}
.ex-btn.cl{background:rgba(255,255,255,.06);color:var(--w7)}

/* Toast */
.toast{position:fixed;top:max(48px,calc(var(--sat) + 36px));left:50%;transform:translateX(-50%) translateY(-16px);padding:8px 16px;border-radius:10px;font-size:13px;font-weight:700;z-index:300;opacity:0;transition:all .2s;pointer-events:none;white-space:nowrap;background:var(--g);color:#0a1a10;box-shadow:0 4px 16px rgba(167,238,67,.3)}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="toast" id="toast"></div>

<!-- SETUP -->
<div class="setup" id="setup">
<div class="su-h"><h1>Setup Mejenga</h1><p>Arma los equipos y arranca</p></div>
<div class="su-b">
  <div class="su-lbl">Partido</div>
  <div class="su-fx">
    <input class="si" id="sN" placeholder="Mejenga 7" value="Mejenga 7">
    <input class="si" id="sF" placeholder="Fut 5" value="Fut 5" style="width:80px;flex:none">
  </div>
  <div class="su-t"><div class="su-td t1"></div><span class="su-tn">Equipo Negro</span></div>
  <div id="st1"></div>
  <button class="su-a" onclick="addR('st1')">+ Jugador</button>
  <div class="su-t"><div class="su-td t2"></div><span class="su-tn">Equipo Verde</span></div>
  <div id="st2"></div>
  <button class="su-a" onclick="addR('st2')">+ Jugador</button>
</div>
<div class="su-ft"><button class="su-go" onclick="go()">Iniciar Mejenga</button></div>
</div>

<!-- APP -->
<div class="app" id="app">
<div class="sb">
  <div class="sb-side"><div class="sb-dot t1">N</div><div class="sb-nm">Negro</div></div>
  <div class="sb-sc t1" id="s1">0</div>
  <div class="sb-d">-</div>
  <div class="sb-sc t2" id="s2">0</div>
  <div class="sb-side" style="flex-direction:row-reverse"><div class="sb-dot t2">V</div><div class="sb-nm">Verde</div></div>
  <div class="sb-tm off" id="tmr" onclick="togT()">00:00</div>
</div>
<div class="pitch">
  <div class="fm bd"></div><div class="fm hl"></div><div class="fm cc"></div><div class="fm cd"></div>
  <div class="fm bt"></div><div class="fm bb"></div><div class="fm gt"></div><div class="fm gb"></div>
  <div id="nd"></div>
</div>
<div class="ib">
  <div class="ib-ev" id="ec">0</div>
  <div class="ib-last" id="le">Toca un jugador</div>
  <div class="ib-btn" onclick="openTl()">Timeline</div>
  <div class="ib-btn" onclick="openEx()">Datos</div>
</div>
</div>

<!-- POPUP -->
<div class="pop-bg" id="popBg" onclick="closePop()">
<div class="pop" onclick="event.stopPropagation()">
  <div class="pop-hd">
    <div class="pop-j" id="pJ"></div>
    <div style="flex:1"><div class="pop-nm" id="pN"></div><div class="pop-ps" id="pP"></div></div>
    <button class="pop-x" onclick="closePop()">✕</button>
  </div>
  <div id="pB"></div>
</div>
</div>

<!-- ASSIST -->
<div class="ast-bg" id="astBg">
<div class="ast-sh">
  <div class="ast-t">Gol! Quien asistio?</div>
  <div class="ast-g" id="astG"></div>
  <button class="ast-no" onclick="doAst(null)">Sin asistencia</button>
</div>
</div>

<!-- TIMELINE -->
<div class="tl-bg" id="tlBg">
<button class="tl-x" onclick="closeTl()">✕</button>
<div class="tl-w">
  <div class="tl-hd">
    <div class="tl-mn" id="tlM"></div>
    <div class="tl-sr">
      <div class="tl-ts"><div class="tl-td t1">N</div><div class="tl-tn">Negro</div></div>
      <div style="display:flex;align-items:center;gap:8px"><div class="tl-fs t1" id="tS1">0</div><div class="tl-fd">-</div><div class="tl-fs t2" id="tS2">0</div></div>
      <div class="tl-ts"><div class="tl-td t2">V</div><div class="tl-tn">Verde</div></div>
    </div>
    <div class="tl-dur" id="tDur"></div>
  </div>
  <div class="tl-bd" id="tlBd"></div>
</div>
</div>

<!-- EXPORT -->
<div class="ex-bg" id="exBg">
<div class="ex-sh">
  <div class="ex-t">Datos del partido</div>
  <pre class="ex-pre" id="exP"></pre>
  <div class="ex-row">
    <button class="ex-btn cl" onclick="closeEx()">Cerrar</button>
    <button class="ex-btn cp" onclick="cpEx()">Copiar</button>
  </div>
</div>
</div>

<script>
// ── SVG ICONS ──
const I={
  goal:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><path d="M12 2a15 15 0 0 1 4 10 15 15 0 0 1-4 10 15 15 0 0 1-4-10 15 15 0 0 1 4-10z"/><path d="M2 12h20"/></svg>`,
  assist:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>`,
  save:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 11V6a2 2 0 0 0-2-2 2 2 0 0 0-2 2"/><path d="M14 10V4a2 2 0 0 0-2-2 2 2 0 0 0-2 2v2"/><path d="M10 10.5V6a2 2 0 0 0-2-2 2 2 0 0 0-2 2v8"/><path d="M18 8a2 2 0 1 1 4 0v6a8 8 0 0 1-8 8h-2c-2.8 0-4.5-.86-5.99-2.34l-3.6-3.6a2 2 0 0 1 2.83-2.82L7 17"/></svg>`,
  shotOn:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>`,
  shotOff:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M5 12h14"/><path d="M12 5l7 7-7 7"/></svg>`,
  clear:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>`
};

// ── STATE ──
let N='',F='',P=[],EV=[],sel=null,tOn=false,tS=0,tI=null,goalP=null;

// ── SETUP ──
function initS(){
  ren('st1',[{n:'',m:'',p:1},{n:'',m:''},{n:'',m:''},{n:'',m:''},{n:'',m:''}]);
  ren('st2',[{n:'',m:'',p:1},{n:'',m:''},{n:'',m:''},{n:'',m:''},{n:'',m:''}]);
}
function ren(id,d){
  const c=document.getElementById(id);
  c.innerHTML=d.map((x,i)=>`<div class="su-r">
    <input class="si sn" value="${x.n}" placeholder="#" maxlength="2" inputmode="numeric"
      onkeydown="if(event.key==='Enter'||event.key==='Tab'){event.preventDefault();focusNext(this)}">
    <input class="si" value="${x.m}" placeholder="${x.p?'Portero':'Jugador '+(i+1)}" autocapitalize="words"
      onkeydown="if(event.key==='Enter'){event.preventDefault();focusNext(this)}">
    ${x.p?'<span class="su-p">POR</span>':`<button class="su-x" onclick="delR(this)">✕</button>`}
  </div>`).join('');
  c._d=d;
}
function focusNext(el){
  const all=[...document.querySelectorAll('#setup .si')];
  const i=all.indexOf(el);
  if(i<all.length-1)all[i+1].focus();
  else all[i].blur();
}
function addR(id){const c=document.getElementById(id),d=c._d||[];d.push({n:'',m:''});ren(id,d);const ins=c.querySelectorAll('.sn');ins[ins.length-1]?.focus();}
function delR(b){const r=b.closest('.su-r'),c=r.parentElement,d=c._d,i=[...c.children].indexOf(r);if(d.length>2){d.splice(i,1);ren(c.id,d);}}
function readT(id,t){
  const rows=document.getElementById(id).querySelectorAll('.su-r'),out=[];
  rows.forEach((r,i)=>{
    const n=r.querySelector('.sn').value.trim();
    const m=r.querySelectorAll('.si')[1].value.trim();
    if(m||n)out.push({id:t+'_'+i,team:t,num:n||'-',name:m||(i===0?'Portero':'Jugador '+(i+1)),por:i===0,goals:0,assists:0,saves:0,shotsOn:0,shotsOff:0,clearances:0});
  });
  return out;
}
function go(){
  N=document.getElementById('sN').value.trim()||'Mejenga';
  F=document.getElementById('sF').value.trim()||'Fut 5';
  const a=readT('st1','t1'),b=readT('st2','t2');
  if(!a.length&&!b.length){show('Agrega jugadores');return;}
  P=[...a,...b];
  document.getElementById('setup').classList.add('gone');
  document.getElementById('app').classList.add('on');
  draw();
}

// ── FIELD ──
function draw(){
  const nd=document.getElementById('nd');
  const t1=P.filter(p=>p.team==='t1'),t2=P.filter(p=>p.team==='t2');
  const f1=form(t1.length,true),f2=form(t2.length,false);
  let h='';
  t1.forEach((p,i)=>{h+=node(p,f1[i])});
  t2.forEach((p,i)=>{h+=node(p,f2[i])});
  nd.innerHTML=h;
}
function form(n,top){
  if(!n)return[];
  const pts=[],yA=top?5:53,yB=top?47:95;
  pts.push([50,top?yA+3:yB-3]);
  const f=n-1;if(!f)return pts;
  let rows;
  if(f<=2)rows=[f];
  else if(f<=4)rows=[Math.ceil(f/2),Math.floor(f/2)];
  else if(f<=6)rows=[2,Math.ceil((f-2)/2),Math.floor((f-2)/2)];
  else rows=[3,Math.ceil((f-3)/2),Math.floor((f-3)/2)];
  rows.forEach((cnt,ri)=>{
    const frac=(ri+1)/(rows.length+1);
    const ry=top?yA+(yB-yA)*frac:yB-(yB-yA)*frac;
    for(let j=0;j<cnt;j++){
      pts.push([10+(j+1)/(cnt+1)*80,ry]);
    }
  });
  return pts;
}
function node(p,xy){
  if(!xy)xy=[50,50];
  const gb=p.goals>0?`<div class="badge bg">${p.goals}</div>`:'';
  const sb=p.por&&p.saves>0?`<div class="badge bs">${p.saves}</div>`:'';
  return `<div class="pn ${p.team}${p.por?' por':''}" style="left:${xy[0]}%;top:${xy[1]}%;transform:translate(-50%,-50%)" onclick="tap('${p.id}')">
    <div class="bl">${p.num}${gb}${sb}</div>
    <div class="lb">${p.name.split(' ')[0]}</div>
  </div>`;
}

// ── POPUP ──
function tap(id){
  sel=id;
  const p=P.find(x=>x.id===id);if(!p)return;
  const j=document.getElementById('pJ');
  j.className='pop-j '+p.team;j.textContent=p.num;
  document.getElementById('pN').textContent=p.name;
  document.getElementById('pP').textContent=p.por?'Portero':'Jugador de campo';
  buildPop(p);
  document.getElementById('popBg').classList.add('on');
}
function buildPop(p){
  let h='';
  if(p.por){
    h+=sc('saves',I.save,'Tapadas','tap',p.saves,true);
    h+=`<div class="sg">`;
    h+=sc('goals',I.goal,'Goles','gol',p.goals);
    h+=sc('assists',I.assist,'Asist','ast',p.assists);
    h+=sc('clearances',I.clear,'Clear','cle',p.clearances);
    h+=sc('shotsOn',I.shotOn,'Al arco','tir',p.shotsOn);
    h+=sc('shotsOff',I.shotOff,'Afuera','tir',p.shotsOff);
    h+=`</div>`;
  }else{
    h+=sc('goals',I.goal,'Goles','gol',p.goals,true);
    h+=`<div class="sg">`;
    h+=sc('assists',I.assist,'Asist','ast',p.assists);
    h+=sc('shotsOn',I.shotOn,'Al arco','tir',p.shotsOn);
    h+=sc('shotsOff',I.shotOff,'Afuera','tir',p.shotsOff);
    h+=sc('clearances',I.clear,'Clear','cle',p.clearances);
    h+=sc('saves',I.save,'Tapadas','tap',p.saves);
    h+=`</div>`;
  }
  document.getElementById('pB').innerHTML=h;
}
function sc(t,ico,lbl,cls,v,pri){
  return `<div class="sc ${cls}${pri?' pri':''}">
    <div class="sc-top"><span class="sc-ico">${ico}</span><span class="sc-lb">${lbl}</span></div>
    <div class="sc-row">
      <button class="sc-btn mn" onclick="adj('${t}',-1)">-</button>
      <div class="sc-v">${v}</div>
      <button class="sc-btn" onclick="adj('${t}',1)">+</button>
    </div>
  </div>`;
}
function adj(t,d){
  const p=P.find(x=>x.id===sel);if(!p)return;
  const old=p[t];
  p[t]=Math.max(0,p[t]+d);
  if(p[t]===old)return;

  if(d>0){
    if(t==='goals'){
      addEv('goal',p);
      updSc();draw();buildPop(p);
      goalP=p;
      showAst(p);
      if(navigator.vibrate)navigator.vibrate([15,50,15]);
      return;
    }
    addEv(t,p);
  }else{
    // undo last event of type
    for(let i=EV.length-1;i>=0;i--){
      if(EV[i].type===(t==='goals'?'goal':t)&&EV[i].pid===p.id){
        if(t==='goals'&&EV[i].astBy){
          const a=P.find(x=>x.name===EV[i].astBy);
          if(a)a.assists=Math.max(0,a.assists-1);
        }
        EV.splice(i,1);break;
      }
    }
  }
  updSc();draw();buildPop(p);
  if(navigator.vibrate)navigator.vibrate(8);
}
function closePop(){document.getElementById('popBg').classList.remove('on');sel=null;}

// ── ASSIST ──
function showAst(scorer){
  const tm=P.filter(p=>p.team===scorer.team&&p.id!==scorer.id);
  document.getElementById('astG').innerHTML=tm.map(p=>
    `<div class="ast-b" onclick="doAst('${p.id}')"><div class="ast-j ${p.team}">${p.num}</div><div class="ast-n">${p.name.split(' ')[0]}</div></div>`
  ).join('');
  document.getElementById('astBg').classList.add('on');
}
function doAst(id){
  document.getElementById('astBg').classList.remove('on');
  if(id&&goalP){
    const a=P.find(p=>p.id===id);
    if(a){
      a.assists++;
      addEv('assists',a);
      const lg=[...EV].reverse().find(e=>e.type==='goal'&&e.pid===goalP.id);
      if(lg)lg.astBy=a.name;
    }
  }
  show('Gol registrado'+(id?' + asistencia':''));
  goalP=null;
  updSc();draw();
  if(sel){const p=P.find(x=>x.id===sel);if(p)buildPop(p);}
}

// ── EVENTS ──
function addEv(t,p){EV.push({type:t,pid:p.id,player:p.name,team:p.team,num:p.num,time:ft(tS),ts:Date.now()});updIb();}
function updIb(){
  document.getElementById('ec').textContent=EV.length;
  if(EV.length){const l=EV[EV.length-1];document.getElementById('le').textContent=`${l.time} ${l.player}`;}
}
function updSc(){
  document.getElementById('s1').textContent=P.filter(p=>p.team==='t1').reduce((s,p)=>s+p.goals,0);
  document.getElementById('s2').textContent=P.filter(p=>p.team==='t2').reduce((s,p)=>s+p.goals,0);
}

// ── TIMER ──
function togT(){
  const el=document.getElementById('tmr');
  if(tOn){clearInterval(tI);tOn=false;el.className='sb-tm off';el.textContent=ft(tS);}
  else{tI=setInterval(()=>{tS++;document.getElementById('tmr').textContent=ft(tS);},1000);tOn=true;el.className='sb-tm on';el.textContent=ft(tS);}
}
function ft(s){return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0')}

// ── TIMELINE ──
function openTl(){
  const g1=P.filter(p=>p.team==='t1').reduce((s,p)=>s+p.goals,0);
  const g2=P.filter(p=>p.team==='t2').reduce((s,p)=>s+p.goals,0);
  document.getElementById('tlM').textContent=N+' · '+F;
  document.getElementById('tS1').textContent=g1;
  document.getElementById('tS2').textContent=g2;
  document.getElementById('tDur').textContent=ft(tS)+' jugados';
  const bd=document.getElementById('tlBd'),goals=EV.filter(e=>e.type==='goal');
  if(!goals.length){bd.innerHTML='<div class="tl-emp">No hay goles todavia</div>';document.getElementById('tlBg').classList.add('on');return;}
  let r1=0,r2=0,h='';
  goals.forEach(g=>{
    if(g.team==='t1')r1++;else r2++;
    const ast=g.astBy?`<div class="tl-a">Ast. ${g.astBy.split(' ')[0]}</div>`:'';
    h+=`<div class="tl-r ${g.team}"><div class="tl-dt"></div><div class="tl-c">
      <div class="tl-m">${g.time}'</div><div><div class="tl-p">${g.player}</div>${ast}</div>
    </div></div>`;
    h+=`<div class="tl-rs" style="color:${g.team==='t1'?'#fff':'var(--g)'}">${r1} - ${r2}</div>`;
  });
  bd.innerHTML=h;
  document.getElementById('tlBg').classList.add('on');
}
function closeTl(){document.getElementById('tlBg').classList.remove('on')}

// ── EXPORT ──
function openEx(){
  const t1=P.filter(p=>p.team==='t1'),t2=P.filter(p=>p.team==='t2');
  const g1=t1.reduce((s,p)=>s+p.goals,0),g2=t2.reduce((s,p)=>s+p.goals,0);
  let t=`${N} · ${F}\n`;
  t+=`Resultado: Negro ${g1} - ${g2} Verde\n\n`;
  t+=`EQUIPO NEGRO\n`;t1.forEach(p=>{t+=pL(p)});
  t+=`\nEQUIPO VERDE\n`;t2.forEach(p=>{t+=pL(p)});
  if(EV.length){
    t+=`\nCRONOLOGIA\n`;
    EV.forEach(e=>{t+=`${e.time} #${e.num} ${e.player} - ${e.type}`;if(e.astBy)t+=` (ast. ${e.astBy})`;t+='\n';});
  }
  document.getElementById('exP').textContent=t;
  document.getElementById('exBg').classList.add('on');
}
function pL(p){
  let s=[];
  if(p.goals)s.push(p.goals+'G');if(p.assists)s.push(p.assists+'A');if(p.saves)s.push(p.saves+'T');
  if(p.shotsOn)s.push(p.shotsOn+'TA');if(p.shotsOff)s.push(p.shotsOff+'TF');if(p.clearances)s.push(p.clearances+'CL');
  return `#${p.num} ${p.name}${p.por?' (POR)':''}${s.length?' - '+s.join(' '):''}\n`;
}
function closeEx(){document.getElementById('exBg').classList.remove('on')}
function cpEx(){
  const t=document.getElementById('exP').textContent;
  navigator.clipboard.writeText(t).then(()=>{show('Copiado');closeEx();}).catch(()=>prompt('Copia:',t));
}

// ── TOAST ──
function show(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('on');setTimeout(()=>t.classList.remove('on'),1500)}

// INIT
initS();
</script>
</body>
</html>
